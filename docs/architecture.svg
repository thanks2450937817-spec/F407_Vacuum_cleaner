<svg width="680" height="512" viewBox="0 0 680 512" xmlns="http://www.w3.org/2000/svg" font-family="Microsoft YaHei, PingFang SC, Segoe UI, Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="680" height="512" rx="12" fill="#ffffff"/>
<defs>
